services:
  - type: web
    name: ecoguide-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /_stcore/health
